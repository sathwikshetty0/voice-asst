<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Voice Assistant</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #09090f;
      --panel: rgba(17, 24, 39, 0.88);
      --panel-2: rgba(15, 23, 42, 0.96);
      --line: rgba(148, 163, 184, 0.18);
      --text: #f4f7ff;
      --muted: #cbd5e1;
      --accent: #7c3aed;
      --accent-2: #a78bfa;
      --user: linear-gradient(145deg, #4c1d95, #6d28d9);
      --assistant: rgba(30, 41, 59, 0.98);
      --danger: #fb7185;
      --shadow: 0 18px 45px rgba(17, 24, 39, 0.45);
    }

    * { box-sizing: border-box; font-family: Inter, "Segoe UI", Arial, sans-serif; }

    html, body { height: 100%; margin: 0; background:
      radial-gradient(circle at top, #111827 0%, #070b12 42%, #04070d 100%); color: var(--text); }

    body { display: flex; justify-content: center; align-items: stretch; overflow: hidden; }

    .app-shell {
      width: min(1200px, 100vw);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      background: linear-gradient(145deg, rgba(9, 11, 18, 0.98), rgba(15, 23, 42, 0.96));
      border-left: 1px solid rgba(148, 163, 184, 0.1);
      border-right: 1px solid rgba(148, 163, 184, 0.1);
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
    }

    .topbar {
      display: flex; justify-content: space-between; align-items: center;
      padding: 18px 20px 10px;
      border-bottom: 1px solid rgba(148, 163, 184, 0.12);
      background: linear-gradient(180deg, rgba(17, 24, 39, 0.95), rgba(15, 23, 42, 0.85));
      backdrop-filter: blur(12px);
      z-index: 3;
    }

    .brand {
      display: flex; align-items: center; gap: 12px;
    }

    .brand-badge {
      width: 44px; height: 44px; border-radius: 12px;
      background: linear-gradient(145deg, #7c3aed, #a78bfa);
      display: grid; place-items: center;
      box-shadow: 0 12px 24px rgba(124, 58, 237, 0.25);
      font-weight: 800;
      letter-spacing: 0.04em;
    }

    .brand h1 { margin: 0; font-size: 18px; font-weight: 700; }
    .brand p { margin: 2px 0 0; color: var(--muted); font-size: 12px; }

    .top-actions { display: flex; align-items: center; gap: 12px; }

    .icon-btn {
      width: 42px; height: 42px; border-radius: 12px; border: 1px solid rgba(148, 163, 184, 0.2);
      background: rgba(15, 23, 42, 0.96); color: var(--text); display: grid; place-items: center;
      cursor: pointer; transition: transform 0.15s ease, background 0.2s ease, border-color 0.2s ease;
      box-shadow: 0 10px 18px rgba(15, 23, 42, 0.45);
    }
    .icon-btn:hover { transform: translateY(-1px); border-color: rgba(168, 85, 247, 0.5); }

    .settings-wrap { position: relative; }

    .settings-panel {
      position: absolute; right: 0; top: calc(100% + 8px);
      width: 340px; background: var(--panel-2); border: 1px solid rgba(148, 163, 184, 0.18);
      border-radius: 18px; box-shadow: var(--shadow); overflow: hidden;
      transform-origin: top right; transform: scaleY(0.94) translateY(-6px); opacity: 0; pointer-events: none;
      transition: transform 0.26s ease, opacity 0.24s ease; backdrop-filter: blur(18px);
    }
    .settings-panel.open { transform: scaleY(1) translateY(0); opacity: 1; pointer-events: auto; }

    .settings-panel header { padding: 14px 16px; border-bottom: 1px solid rgba(148, 163, 184, 0.12); }
    .settings-panel h2 { margin: 0; font-size: 14px; font-weight: 700; }
    .settings-panel p { margin: 4px 0 0; color: var(--muted); font-size: 12px; }

    .settings-body { padding: 14px; display: grid; gap: 10px; }
    .field { display: grid; gap: 6px; }
    .field label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.12em; }
    .field input {
      background: rgba(15, 23, 42, 0.98); border: 1px solid rgba(148, 163, 184, 0.18); color: var(--text);
      border-radius: 12px; padding: 10px 12px; font-size: 13px; outline: none; transition: border-color 0.15s ease, box-shadow 0.2s ease;
    }
    .field input:focus { border-color: rgba(167, 139, 250, 0.8); box-shadow: 0 0 0 4px rgba(124, 58, 237, 0.12); }

    .settings-footer { display: flex; justify-content: space-between; align-items: center; gap: 8px; padding: 0 14px 14px; }
    .tiny { font-size: 11px; color: var(--muted); }
    .btn {
      border: 0; border-radius: 12px; padding: 10px 12px; background: linear-gradient(135deg, #7c3aed, #5b21b6); color: white;
      cursor: pointer; font-weight: 700; box-shadow: 0 12px 18px rgba(124, 58, 237, 0.22); transition: transform 0.15s ease, filter 0.15s ease;
    }
    .btn:hover { transform: translateY(-1px); filter: brightness(1.06); }
    .btn.secondary { background: rgba(30, 41, 59, 0.92); color: var(--text); box-shadow: none; border: 1px solid rgba(148, 163, 184, 0.18); }

    .main { display: flex; flex-direction: column; flex: 1; min-height: 0; }

    .conversation {
      flex: 1; overflow-y: auto; padding: 18px 18px 8px; display: flex; flex-direction: column; gap: 12px;
      scroll-behavior: smooth;
    }

    .chat-bubble {
      max-width: min(82%, 760px); padding: 12px 14px; border-radius: 18px;
      font-size: 15px; line-height: 1.6; color: white; box-shadow: 0 12px 25px rgba(15, 23, 42, 0.35);
      word-break: break-word; white-space: pre-wrap;
      border: 1px solid rgba(148, 163, 184, 0.12);
    }
    .chat-bubble.user { align-self: flex-end; background: var(--user); border-bottom-right-radius: 6px; }
    .chat-bubble.assistant { align-self: flex-start; background: var(--assistant); border-bottom-left-radius: 6px; }
    .chat-bubble.system { align-self: center; max-width: 92%; background: rgba(17, 24, 39, 0.88); color: var(--muted); font-size: 12px; text-align: center; border-radius: 999px; padding: 8px 10px; }

    .status-panel {
      padding: 10px 18px 14px; border-top: 1px solid rgba(148, 163, 184, 0.12); border-bottom: 1px solid rgba(148, 163, 184, 0.12);
      background: linear-gradient(180deg, rgba(15, 23, 42, 0.9), rgba(15, 23, 42, 0.56));
      display: flex; align-items: center; justify-content: space-between; gap: 10px;
      z-index: 2;
    }

    .status-pill {
      display: inline-flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 999px;
      background: rgba(17, 24, 39, 0.96); border: 1px solid rgba(148, 163, 184, 0.18); color: var(--muted);
      font-size: 13px; font-weight: 600;
    }
    .dot { width: 9px; height: 9px; border-radius: 50%; background: #38bdf8; box-shadow: 0 0 0 0 rgba(56, 189, 248, 0.35); animation: pulseDot 1.4s infinite; }
    .dot.idle { background: #94a3b8; box-shadow: none; animation: none; }
    .dot.listening { background: #a78bfa; box-shadow: 0 0 0 0 rgba(167, 139, 250, 0.55); animation: pulseDot 1.2s infinite; }
    .dot.thinking { background: #f0abfc; animation: pulseDot 1.4s infinite; }
    .dot.speaking { background: #22c55e; animation: pulseDot 1.1s infinite; }
    @keyframes pulseDot {
      0% { box-shadow: 0 0 0 0 rgba(124, 58, 237, 0.35); }
      70% { box-shadow: 0 0 0 10px rgba(124, 58, 237, 0); }
      100% { box-shadow: 0 0 0 0 rgba(124, 58, 237, 0); }
    }

    .voice-note { color: var(--muted); font-size: 12px; max-width: 340px; text-align: right; }

    .controls {
      display: flex; justify-content: center; align-items: center; padding: 14px 16px 18px;
      background: linear-gradient(180deg, rgba(9, 11, 18, 0.2), rgba(9, 11, 18, 0.9));
      border-top: 1px solid rgba(148, 163, 184, 0.15);
      position: relative;
    }

    .mic-wrap { display: grid; justify-items: center; gap: 8px; }

    .mic-button {
      width: 82px; height: 82px; border-radius: 50%; border: 1px solid rgba(148, 163, 184, 0.18);
      display: grid; place-items: center; color: white; background: linear-gradient(145deg, #111827, #1f2937);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.08), 0 10px 30px rgba(15, 23, 42, 0.6);
      cursor: pointer; transition: transform 0.16s ease, box-shadow 0.18s ease, background 0.16s ease;
      position: relative;
      overflow: hidden;
    }
    .mic-button::after {
      content: ""; position: absolute; inset: -10px; border-radius: 50%; border: 1px solid rgba(124, 58, 237, 0.15);
      opacity: 0; transition: opacity 0.18s ease, transform 0.18s ease;
    }
    .mic-button:hover:not(:disabled) { transform: translateY(-1px) scale(1.02); }
    .mic-button:disabled { cursor: not-allowed; opacity: 0.6; }
    .mic-button.idle { background: linear-gradient(145deg, #111827, #1f2937); }
    .mic-button.listening {
      background: linear-gradient(145deg, #7c3aed, #5b21b6);
      box-shadow: 0 0 0 0 rgba(124, 58, 237, 0.35), 0 18px 28px rgba(124, 58, 237, 0.28);
      animation: pulse 1.4s infinite;
    }
    .mic-button.listening::after { opacity: 1; transform: scale(1.03); }
    .mic-button.thinking { background: linear-gradient(145deg, #312e81, #581c87); }
    .mic-button.speaking { background: linear-gradient(145deg, #14532d, #15803d); }
    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(124, 58, 237, 0.35), 0 18px 28px rgba(124, 58, 237, 0.25); }
      70% { box-shadow: 0 0 0 12px rgba(124, 58, 237, 0), 0 18px 28px rgba(124, 58, 237, 0.18); }
      100% { box-shadow: 0 0 0 0 rgba(124, 58, 237, 0), 0 18px 28px rgba(124, 58, 237, 0.18); }
    }

    .micro-icon { font-size: 30px; line-height: 1; }
    .hint { color: var(--muted); font-size: 12px; }

    @media (max-width: 900px) {
      .app-shell { width: 100vw; }
      .status-panel { flex-direction: column; align-items: flex-start; }
      .voice-note { text-align: left; max-width: 100%; }
      .settings-panel { width: min(340px, calc(100vw - 18px)); }
    }
  </style>
</head>
<body>
  <main class="app-shell">
    <header class="topbar">
      <div class="brand">
        <div class="brand-badge">VA</div>
        <div>
          <h1>Voice Assistant</h1>
          <p>Fast, natural voice conversations</p>
        </div>
      </div>
      <div class="top-actions">
        <div class="settings-wrap">
          <button id="settingsToggle" class="icon-btn" aria-label="Open settings" title="Settings">⚙️</button>
          <aside id="settingsPanel" class="settings-panel" aria-label="Settings panel">
            <header>
              <h2>Settings</h2>
              <p>Save your API keys locally in this browser.</p>
            </header>
            <div class="settings-body">
              <div class="field">
                <label for="nvidiaKey">NVIDIA API Key</label>
                <input id="nvidiaKey" type="password" placeholder="Enter your NVIDIA API key" />
              </div>
            </div>
            <div class="settings-footer">
              <span class="tiny">Stored as localStorage values.</span>
              <button id="saveSettings" class="btn" type="button">Save</button>
            </div>
          </aside>
        </div>
      </div>
    </header>

    <section class="main">
      <article id="conversation" class="conversation" aria-live="polite"></article>

      <section class="status-panel">
        <div class="status-pill"><span id="statusDot" class="dot idle"></span><span id="statusText">Ready</span></div>
        <div id="statusNote" class="voice-note">Tap the mic to start speaking. Responses stream live as they arrive.</div>
      </section>

      <section class="controls">
        <div class="mic-wrap">
          <button id="micButton" class="mic-button idle" type="button" aria-label="Speak" title="Speak">
            <span class="micro-icon">🎙️</span>
          </button>
          <div id="micHint" class="hint">Click to talk</div>
        </div>
      </section>
    </section>
  </main>

  <script>
    const NVIDIA_API_KEY = "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";
    const ELEVENLABS_API_KEY = "";
    const ELEVENLABS_VOICE_ID = "";
    const NVIDIA_ENDPOINT = '/api/nvidia';

    const STORAGE_KEYS = {
      nvidia: 'nvidia_key',
      elevenlabs: 'elevenlabs_key',
      voice: 'elevenlabs_voice'
    };

    const SYSTEM_PROMPT = "You are a warm, emotionally intelligent voice companion. Speak naturally like a real human. Never sound robotic. Keep responses conversational. Normally respond in 2-4 sentences. Match the user's emotional tone. Be caring when they are sad. Be energetic when they are excited. Avoid bullet points unless explicitly requested. Prioritize natural spoken language.";

    const conversationEl = document.getElementById('conversation');
    const statusTextEl = document.getElementById('statusText');
    const statusDotEl = document.getElementById('statusDot');
    const statusNoteEl = document.getElementById('statusNote');
    const micButton = document.getElementById('micButton');
    const micHint = document.getElementById('micHint');

    let conversationHistory = [];
    let recognition = null;
    let currentAudio = null;
    let currentSynth = null;
    let isListening = false;
    let isThinking = false;
    let isSpeaking = false;
    let lastSpeechText = '';
    let speechRecognitionAvailable = false;
    let pendingFinalTranscript = '';

    const storage = {
      get(key, fallback) {
        const value = localStorage.getItem(key);
        if (value && value.trim()) return value.trim();
        return fallback || '';
      },
      set(key, value) {
        if (value && value.trim()) localStorage.setItem(key, value.trim());
        else localStorage.removeItem(key);
      }
    };

    function isPlaceholder(value) {
      return !value || value.includes('YOUR_');
    }

    function getCurrentKeys() {
      const nvidia = storage.get(STORAGE_KEYS.nvidia, NVIDIA_API_KEY);
      const eleven = storage.get(STORAGE_KEYS.elevenlabs, ELEVENLABS_API_KEY);
      const voice = storage.get(STORAGE_KEYS.voice, ELEVENLABS_VOICE_ID);
      return {
        nvidia: isPlaceholder(nvidia) ? '' : nvidia,
        elevenlabs: isPlaceholder(eleven) ? '' : eleven,
        voiceId: isPlaceholder(voice) ? '' : voice
      };
    }

    function addMessage(role, text, options = {}) {
      const bubble = document.createElement('div');
      bubble.className = `chat-bubble ${role}`;
      if (options.system) bubble.classList.add('system');
      bubble.textContent = text;
      conversationEl.appendChild(bubble);
      conversationEl.scrollTop = conversationEl.scrollHeight;
      return bubble;
    }

    function setStatus(text, mode = 'idle', note = '') {
      statusTextEl.textContent = text;
      statusDotEl.className = `dot ${mode}`;
      statusNoteEl.textContent = note || 'Tap the mic to start speaking. Responses stream live as they arrive.';
    }

    function setMicMode(mode) {
      micButton.className = `mic-button ${mode}`;
      micButton.disabled = mode === 'thinking' || mode === 'speaking';
      micHint.textContent = mode === 'listening'
        ? 'Listening…'
        : mode === 'thinking'
          ? 'Thinking…'
          : mode === 'speaking'
            ? 'Speaking…'
            : 'Click to talk';
    }

    function clearConversation() {
      conversationEl.innerHTML = '';
      conversationHistory = [];
      setStatus('Ready', 'idle');
      setMicMode('idle');
    }

    function ensureSpeechSupport() {
      const SpeechRecognitionCtor = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SpeechRecognitionCtor) {
        speechRecognitionAvailable = false;
        addMessage('assistant', 'Please use Chrome or Edge for voice support.', { system: true });
        setStatus('Voice unavailable', 'idle', 'Use Chrome or Edge for voice input support.');
        return false;
      }
      speechRecognitionAvailable = true;
      return true;
    }

    function initSpeechRecognition() {
      if (!ensureSpeechSupport()) return;

      try {
        const SpeechRecognitionCtor = window.SpeechRecognition || window.webkitSpeechRecognition;
        recognition = new SpeechRecognitionCtor();
        recognition.continuous = false;
        recognition.interimResults = true;
        recognition.lang = 'en-US';

        recognition.onstart = () => {
          isListening = true;
          setStatus('Listening…', 'listening', 'Speak naturally and pause when you are done.');
          setMicMode('listening');
        };

        recognition.onerror = (event) => {
          console.error('Speech recognition error:', event.error);
          let message = 'Voice input is not available right now.';
          if (event.error === 'not-allowed') message = 'Microphone permission was denied.';
          addMessage('assistant', message, { system: true });
          setStatus('Voice input issue', 'idle');
          setMicMode('idle');
          isListening = false;
        };

        recognition.onend = () => {
          isListening = false;
          setMicMode('idle');
          if (pendingFinalTranscript.trim()) {
            const text = pendingFinalTranscript.trim();
            pendingFinalTranscript = '';
            submitUserMessage(text);
          } else {
            setStatus('Ready', 'idle');
          }
        };

        recognition.onresult = (event) => {
          let interim = '';
          let finalText = '';
          for (let i = event.resultIndex; i < event.results.length; i += 1) {
            const transcriptItem = event.results[i][0].transcript;
            if (event.results[i].isFinal) {
              finalText += transcriptItem;
            } else {
              interim += transcriptItem;
            }
          }
          if (finalText) {
            pendingFinalTranscript += (pendingFinalTranscript ? ' ' : '') + finalText;
          }
          setStatus('Listening…', 'listening', interim || 'Speak naturally and pause when you are done.');
          if (interim) {
            statusNoteEl.textContent = 'Live transcript: ' + interim;
          }
        };
      } catch (error) {
        console.error('Failed to initialize speech recognition:', error);
        addMessage('assistant', 'Please use Chrome or Edge for voice support.', { system: true });
      }
    }

    function startListening() {
      stopSpeaking();
      if (isThinking || isSpeaking) return;

      if (!speechRecognitionAvailable) {
        if (!ensureSpeechSupport()) return;
      }

      try {
        pendingFinalTranscript = '';
        setStatus('Listening…', 'listening');
        setMicMode('listening');
        recognition.start();
      } catch (error) {
        console.error('Speech recognition start failed:', error);
        addMessage('assistant', 'Please use Chrome or Edge for voice support.', { system: true });
      }
    }

    function stopListening() {
      if (recognition && isListening) {
        try { recognition.stop(); } catch (error) { console.error(error); }
      }
      isListening = false;
      setMicMode('idle');
    }

    function stopSpeaking() {
      if (currentAudio) {
        try { currentAudio.pause(); currentAudio.currentTime = 0; } catch (error) { console.error(error); }
      }
      try { window.speechSynthesis.cancel(); } catch (error) { console.error(error); }
      currentAudio = null;
      currentSynth = null;
      isSpeaking = false;
    }

    function submitUserMessage(text) {
      const cleanText = text.trim();
      if (!cleanText) return;

      stopListening();
      stopSpeaking();
      setMicMode('thinking');
      setStatus('Thinking…', 'thinking', 'Streaming your response from NVIDIA.');
      if (!isThinking) {
        addMessage('user', cleanText);
      }

      const userMessage = { role: 'user', content: cleanText };
      conversationHistory.push(userMessage);
      conversationHistory = conversationHistory.slice(-20);

      const assistantBubble = addMessage('assistant', '');
      isThinking = true;

      const { nvidia: nvidiaKey } = getCurrentKeys();
      if (!nvidiaKey) {
        isThinking = false;
        assistantBubble.textContent = 'Add your NVIDIA API key in settings.';
        setStatus('Missing API key', 'idle', 'Add your NVIDIA API key in settings to enable responses.');
        setMicMode('idle');
        return;
      }

      const requestMessages = [
        { role: 'system', content: SYSTEM_PROMPT },
        ...conversationHistory
      ];

      fetch(NVIDIA_ENDPOINT, {
        method: 'POST',
        headers: {
          'Authorization': `Bearer ${nvidiaKey}`,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          model: 'meta/llama-3.3-70b-instruct',
          messages: requestMessages,
          temperature: 0.8,
          top_p: 0.9,
          max_tokens: 512,
          stream: true
        })
      })
      .then(async (response) => {
        if (!response.ok) {
          const text = await response.text();
          throw new Error(text || 'NVIDIA request failed');
        }

        const decoder = new TextDecoder();
        const reader = response.body.getReader();
        let fullText = '';
        let streamDone = false;

        while (!streamDone) {
          const { done, value } = await reader.read();
          if (done) break;
          const chunk = decoder.decode(value, { stream: true });
          const lines = chunk.split('\n');
          for (const line of lines) {
            const trimmed = line.trim();
            if (!trimmed.startsWith('data:')) continue;
            const payload = trimmed.replace(/^data:\s*/, '');
            if (payload === '[DONE]') {
              streamDone = true;
              break;
            }
            try {
              const json = JSON.parse(payload);
              const delta = json.choices?.[0]?.delta?.content || '';
              if (delta) {
                isThinking = false;
                setStatus('Streaming…', 'thinking', 'Assistant is replying live.');
                fullText += delta;
                assistantBubble.textContent = fullText;
                conversationEl.scrollTop = conversationEl.scrollHeight;
              }
            } catch (error) {
              // Ignore malformed fragments and keep streaming.
            }
          }
        }

        return fullText;
      })
      .then((fullText) => {
        isThinking = false;
        setMicMode('idle');
        if (!fullText.trim()) {
          assistantBubble.textContent = 'Something went wrong. Please try again.';
          conversationHistory.push({ role: 'assistant', content: 'Something went wrong. Please try again.' });
          setStatus('Response issue', 'idle', 'The reply did not produce content.');
          setMicMode('idle');
          return;
        }

        conversationHistory.push({ role: 'assistant', content: fullText.trim() });
        conversationHistory = conversationHistory.slice(-20);

        setStatus('Speaking…', 'speaking', 'Generating voice playback for the response.');
        setMicMode('speaking');
        speakResponse(fullText.trim());
      })
      .catch((error) => {
        console.error('NVIDIA streaming error:', error);
        isThinking = false;

        const isCorsIssue = /cors|failed to fetch|network|preflight|blocked/i.test(String(error?.message || error || ''));
        const fallbackMessage = isCorsIssue
          ? 'The NVIDIA endpoint is blocking browser requests (CORS). This page needs a local proxy/server or a CORS-enabled endpoint to work.'
          : 'Something went wrong. Please try again.';

        assistantBubble.textContent = fallbackMessage;
        conversationHistory.push({ role: 'assistant', content: fallbackMessage });
        setStatus('Response failed', 'idle', isCorsIssue ? 'Open via HTTP and use a proxy/backend for NVIDIA requests.' : 'Please try again or check your NVIDIA key in settings.');
        setMicMode('idle');
      });
    }

    function speakResponse(text) {
      if (!('speechSynthesis' in window)) {
        setStatus('Voice playback unavailable', 'idle', 'This browser does not support speech synthesis.');
        setMicMode('idle');
        return;
      }

      window.speechSynthesis.cancel();

      // Split text into sentences to avoid Chrome's bug where long utterances die silently.
      const sentences = text.match(/[^.!?]+[.!?]+|[^.!?]+$/g) || [text];

      const chooseVoice = () => {
        const voices = window.speechSynthesis.getVoices();
        return voices.find(v => /google/i.test(v.name) && /en/i.test(v.lang))
          || voices.find(v => /female/i.test(v.name) && /en/i.test(v.lang))
          || voices.find(v => /en/i.test(v.lang))
          || voices[0];
      };

      let index = 0;
      let resumeTimer = null;

      const speakNext = () => {
        if (index >= sentences.length) {
          isSpeaking = false;
          clearInterval(resumeTimer);
          setStatus('Ready', 'idle', 'You can speak again.');
          setMicMode('idle');
          return;
        }

        const utterance = new SpeechSynthesisUtterance(sentences[index].trim());
        utterance.rate = 1;
        utterance.pitch = 1;

        const voice = chooseVoice();
        if (voice) utterance.voice = voice;

        utterance.onstart = () => {
          isSpeaking = true;
          setStatus('Speaking…', 'speaking', 'Voice playback is active.');
          setMicMode('speaking');
        };

        utterance.onend = () => {
          index++;
          speakNext();
        };

        utterance.onerror = (e) => {
          // 'interrupted' and 'canceled' are expected when user stops playback
          if (e.error === 'interrupted' || e.error === 'canceled') return;
          console.error('Speech error:', e.error);
          isSpeaking = false;
          clearInterval(resumeTimer);
          setStatus('Voice playback issue', 'idle');
          setMicMode('idle');
        };

        currentSynth = utterance;
        window.speechSynthesis.speak(utterance);
      };

      // Chrome pauses speechSynthesis after ~15s. This workaround keeps it alive.
      resumeTimer = setInterval(() => {
        if (window.speechSynthesis.speaking && !window.speechSynthesis.paused) {
          window.speechSynthesis.pause();
          window.speechSynthesis.resume();
        }
      }, 10000);

      isSpeaking = true;
      setStatus('Speaking…', 'speaking', 'Starting voice playback.');
      setMicMode('speaking');

      // Wait for voices to load if needed, then start
      if (window.speechSynthesis.getVoices().length === 0) {
        window.speechSynthesis.onvoiceschanged = () => {
          window.speechSynthesis.onvoiceschanged = null;
          speakNext();
        };
      } else {
        speakNext();
      }
    }

    function saveSettings() {
      const nvidiaInput = document.getElementById('nvidiaKey');

      storage.set(STORAGE_KEYS.nvidia, nvidiaInput.value);

      setStatus('Settings saved', 'idle', 'Your browser will use these values for voice and TTS.');
      document.getElementById('settingsPanel').classList.remove('open');
      populateSettingsFields();
    }

    function populateSettingsFields() {
      const { nvidia } = getCurrentKeys();
      document.getElementById('nvidiaKey').value = nvidia || '';
    }

    document.getElementById('settingsToggle').addEventListener('click', () => {
      const panel = document.getElementById('settingsPanel');
      panel.classList.toggle('open');
      if (panel.classList.contains('open')) {
        populateSettingsFields();
      }
    });

    document.getElementById('saveSettings').addEventListener('click', saveSettings);

    micButton.addEventListener('click', () => {
      if (isThinking || isSpeaking) return;
      if (!recognition) {
        initSpeechRecognition();
      }
      if (speechRecognitionAvailable) {
        if (isListening) {
          stopListening();
          setStatus('Ready', 'idle');
        } else {
          startListening();
        }
      } else {
        addMessage('assistant', 'Please use Chrome or Edge for voice support.', { system: true });
      }
    });

    document.addEventListener('DOMContentLoaded', () => {
      if (window.location.protocol === 'file:') {
        addMessage('assistant', 'Open this app from a local HTTP server (for example http://127.0.0.1:3000/index.html) for NVIDIA requests to work.', { system: true });
      } else {
        addMessage('assistant', 'I am ready to help. Tap the mic and speak naturally.', { system: true });
      }
      populateSettingsFields();
      initSpeechRecognition();
      setStatus('Ready', 'idle');
      setMicMode('idle');
      if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
      }
    });
  </script>
</body>
</html>
